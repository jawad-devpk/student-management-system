<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      min-height: 100vh;
      background: #f4f6f9;
    }

    .sidebar {
      width: 22%;
      background: linear-gradient(180deg, #0d6efd, #084298);
      color: white;
      min-height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      padding: 20px;
    }

    .sidebar h3 {
      text-align: center;
      margin-bottom: 30px;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      padding: 12px 15px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .sidebar a:hover,
    .sidebar a.active {
      background: rgba(255, 255, 255, 0.2);
    }

    .main {
      margin-left: 22%;
      padding: 30px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
    }

    .card-custom {
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <h3><i class="bi bi-speedometer2"></i> Dashboard</h3>

    <a href="#" class="active">
      <i class="bi bi-house-door-fill"></i> Home
    </a>
  </div>

  <div class="main">

    <div class="topbar">
      <h2 class="text-primary fw-bold">Welcome To Dashboard</h2>
      <button id="logoutBtn" class="btn btn-outline-danger">
        <i class="bi bi-box-arrow-right"></i> Logout
      </button>
    </div>

    <div class="card card-custom p-4 mb-4">
      <h4 class="text-primary fw-bold mb-3">Student Form</h4>

      <form id="studentForm">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" id="studName" class="form-control" required />
        </div>

        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" id="studEmail" class="form-control" required />


          <button type="button" id="generatePassBtn" class="btn btn-secondary mt-2">
            Generate Password
          </button>

         <small id="passMsg" class="text-success d-block mt-2"></small>

        </div>

        <div class="mb-3">
          <label class="form-label">Course</label>
          <select id="studCourse" class="form-select">
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
            <option>React</option>
            <option>Node.js</option>
            <option>MongoDB</option>
            <option>Python</option>
          </select>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>

        <button type="button" id="studentLoginBtn" class="btn btn-success mt-2">
           Go To Student Login
        </button>

      </form>
    </div>

    <div class="card card-custom p-4">
      <h4 class="text-danger fw-bold mb-3 text-center">Student Details</h4>

      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-danger">
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Course</th>
              <th>Update</th>
              <th>Delete</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="student.js"></script>

  <script>
    document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("token");
    window.location.href = "login.html";  
    });

    document.getElementById("studentLoginBtn").addEventListener("click", () => {
    window.location.href = "studentLogin.html";
    });


  </script>

</body>

</html>
