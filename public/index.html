<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    small.error {
      color: red;
      display: block;
      margin-top: 4px;
    }
  </style>
</head>

<body class="d-flex justify-content-center align-items-center vh-100">

  <form id="signupForm" class="bg-dark text-white d-flex flex-column text-center w-25 shadow p-4 border-2 rounded-2">
    <h2 class="text-primary">SIGNUP</h2>

    <label class="form-label mt-2 text-start" for="name">Name</label>
    <input class="form-control" type="text" id="name" placeholder="Enter name" />
    <small id="nameError" class="error"></small>

    <label class="form-label mt-2 text-start" for="email">Email</label>
    <input class="form-control" type="email" id="email" placeholder="Enter email" />
    <small id="emailError" class="error"></small>

    <label class="form-label mt-2 text-start" for="password">Password</label>
    <input class="form-control" type="password" id="password" placeholder="Enter password" />
    <small id="passwordError" class="error"></small>

    <button type="submit" class="btn btn-primary my-3">Signup</button>

    <p>Already registered? <a href="login.html">Login</a></p>
  </form>

  

  <script>
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("name").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const res = await fetch("/signup", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: name,
            email,
            password
          }),
        });

        const data = await res.json();

        if (res.ok) {
          // alert("Signup successful!");
          window.location.href = "login.html";
        } else {
          alert(data.message || "Signup failed!");
        }
      } catch (err) {
        console.error(err);
        alert("Signup failed!");
      }
    });
  </script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
