<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body class=" d-flex justify-content-center align-items-center vh-100">

  <div class="card shadow-lg p-4 bg-dark text-white" style="width: 380px;">
    <h3 class="text-center text-primary mb-3">LOGIN</h3>

    <form id="loginForm">

      <div class="mb-3 text-start">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" id="email" placeholder="Enter email" required />
        <small id="emailError" class="text-danger"></small>
      </div>

      <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <input class="form-control" type="password" id="password" placeholder="Enter password" required />
        <small id="passwordError" class="text-danger"></small>
      </div>

      <button type="submit" class="btn btn-primary w-100">Login</button>

      <p class="text-center mt-3">
        Not registered yet?
        <a href="./signup.html">Signup</a>
      </p>

    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      document.getElementById("emailError").innerText = "";
      document.getElementById("passwordError").innerText = "";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        // const response = await fetch("http://localhost:4000/login", {
        const response = await fetch("/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (!response.ok) {
          if (data.field === "email") {
            document.getElementById("emailError").innerText = data.message;
          } else if (data.field === "password") {
            document.getElementById("passwordError").innerText = data.message;
          } else {
            alert(data.message);
          }
          return;
        }

        localStorage.setItem("token", data.token);
        window.location.href = "dashboard.html";

      } catch (err) {
        alert("Server not responding");
      }
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
