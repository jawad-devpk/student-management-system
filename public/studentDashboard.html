<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      width: 800px;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      animation: fadeIn 0.6s ease-in-out;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    form input,
    form select {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: 0.3s;
    }

    form input:focus,
    form select:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
    }

    select {
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background: url('data:image/svg+xml;utf8,<svg fill="gray" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>') no-repeat right 10px center;
      background-size: 18px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      background: #667eea;
      color: white;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
      transform: scale(1.03);
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    table th,
    table td {
      padding: 10px;
      text-align: center;
      border: 1px solid #ddd;
    }

    table th {
      background: #667eea;
      color: white;
    }

    img {
      border-radius: 8px;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Student Dashboard</h2>

    <form id="profileForm" enctype="multipart/form-data">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>

      <select name="course" required>
        <option value="">Select Course</option>
        <option value="Web Development">Web Development</option>
        <option value="App Design">App Development</option>
        <option value="AI">AI</option>
        <option value="Digital Marketing">Digital Marketing</option>
      </select>

      <select name="duration" required>
        <option value="">Select Duration</option>
        <option value="3 Months">3 Months</option>
        <option value="4 Months">4 Months</option>
        <option value="6 Months">6 Months</option>
        <option value="8 Months">8 Months</option>
        <option value="1 Year">1 Year</option>
      </select>

      <input type="file" name="image">

      <button type="submit">Update Profile</button>
    </form>

    <hr>

    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Course</th>
          <th>Duration</th>
          <th>Image</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {

      const studentId = localStorage.getItem("studentId");
      if (!studentId) return;

      const savedData = localStorage.getItem(`student_${studentId}`);
      if (savedData) {
        showStudent(JSON.parse(savedData));
      }

      const form = document.getElementById("profileForm");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form); 
        const file = formData.get("image");

        let imageData = null;

        if (file && file.size > 0) {
          imageData = await new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = error => reject(error);
            reader.readAsDataURL(file);
          });
        }
        

        const data = {
          studentName: formData.get("name"),
          studentEmail: formData.get("email"),
          studentCourse: formData.get("course"),
          duration: formData.get("duration"),
          image: imageData 
        };

        localStorage.setItem(`student_${studentId}`, JSON.stringify(data));

        showStudent(data);

      });

      function showStudent(data) {
        document.getElementById("tableBody").innerHTML = `
      <tr>
        <td>${data.studentName}</td>
        <td>${data.studentEmail}</td>
        <td>${data.studentCourse}</td>
        <td>${data.duration}</td>
        <td>${data.image ? `<img src="${data.image}" width="100">` : "No Image"}</td>
      </tr>
    `;
      }
    });
  </script>

</body>

</html>
